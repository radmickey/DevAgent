name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Type check
        run: mypy agent/ --ignore-missing-imports
      - name: Lint
        run: ruff check agent/ tests/

  build:
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e .
          pip install nuitka ordered-set
      - name: Build binary
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --assume-yes-for-downloads \
            --lto=no \
            --output-filename=devagent \
            --include-package=agent \
            --include-package-data=agent \
            --nofollow-import-to=pytest \
            --nofollow-import-to=setuptools \
            --nofollow-import-to=IPython \
            --nofollow-import-to=torch \
            --nofollow-import-to=trio.testing \
            --nofollow-import-to=google.genai \
            --nofollow-import-to=chromadb \
            --nofollow-import-to=onnxruntime \
            --nofollow-import-to=numpy \
            --nofollow-import-to=boto3 \
            --nofollow-import-to=botocore \
            --nofollow-import-to=s3transfer \
            --nofollow-import-to=pygments \
            --nofollow-import-to=logfire \
            --nofollow-import-to=opentelemetry \
            --nofollow-import-to=cohere \
            --nofollow-import-to=xai_sdk \
            --nofollow-import-to=huggingface_hub \
            --nofollow-import-to=tokenizers \
            --nofollow-import-to=grpc \
            agent/interface/cli.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devagent-${{ matrix.os }}
          path: devagent*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            devagent-ubuntu-latest/*
            devagent-macos-latest/*
            devagent-windows-latest/*
          generate_release_notes: true
