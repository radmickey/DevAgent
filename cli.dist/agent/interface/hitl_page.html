<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevAgent — Plan Approval</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #0d1117; color: #c9d1d9; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #58a6ff; margin-bottom: 1rem; }
        .plan { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
                padding: 1.5rem; margin: 1rem 0; }
        .step { padding: 0.75rem 0; border-bottom: 1px solid #21262d; }
        .step:last-child { border-bottom: none; }
        .step-action { color: #7ee787; font-weight: 600; }
        .step-file { color: #79c0ff; font-family: monospace; }
        .buttons { margin-top: 1.5rem; display: flex; gap: 1rem; }
        button { padding: 0.75rem 2rem; border: none; border-radius: 6px;
                 font-size: 1rem; cursor: pointer; font-weight: 600; }
        .approve { background: #238636; color: white; }
        .approve:hover { background: #2ea043; }
        .reject { background: #da3633; color: white; }
        .reject:hover { background: #f85149; }
        .feedback { width: 100%; margin-top: 1rem; padding: 0.75rem;
                    background: #0d1117; border: 1px solid #30363d;
                    border-radius: 6px; color: #c9d1d9; font-size: 0.9rem;
                    resize: vertical; min-height: 80px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DevAgent — Plan Review</h1>
        <div id="plan" class="plan">
            <p>Loading plan...</p>
        </div>
        <textarea id="feedback" class="feedback" placeholder="Optional feedback..."></textarea>
        <div class="buttons">
            <button class="approve" onclick="approve()">Approve</button>
            <button class="reject" onclick="reject()">Reject & Revise</button>
        </div>
    </div>
    <script>
        function approve() {
            document.title = 'APPROVED';
            alert('Plan approved. Return to terminal.');
        }
        function reject() {
            const fb = document.getElementById('feedback').value;
            document.title = 'REJECTED:' + fb;
            alert('Plan rejected. Return to terminal.');
        }
    </script>
</body>
</html>
